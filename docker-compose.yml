services:
  postgres:
    image: postgres:15-alpine
    container_name: contract-postgres
    environment:
      POSTGRES_DB: contract_tracker
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_user -d contract_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: contract-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: contract_tracker
      DB_USER: contract_user
      DB_PASSWORD: contract_password
      JWT_SECRET: dev-secret
      FRONT_ORIGIN: http://localhost:8080
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: contract-frontend
    environment:
      VITE_API_BASE: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
